name: App Build

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: flatpak-x86_64
            toolchain-name: x86_64-unknown-linux-gnu
            platforms: flatpak
            artifact-names: ["nevail-flatpak-x86_64", "", ""]
            artifact-paths: ["build/nevail.flatpak", "", ""]

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore sccache
        id: sccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/sccache
          key: sccache-${{ matrix.name }}

      - uses: actions/checkout@v3
        with:
          submodules: "recursive"

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Build Equicord Extension
        run: |
          cd extern/equicord
          npm install -g pnpm
          pnpm install --frozen-lockfile
          echo "Building Equicord web extension..."
          pnpm buildWeb
          mkdir -p ../../build/extensions
          cp dist/*.zip ../../build/extensions/equicord.zip 2>/dev/null || echo "Note: Extension ZIP might have different name"
          ls -la ../../build/extensions/ || true

      - name: Build
        run: |
          # Clear even more disk space
          sudo apt-get remove -y '^aspnetcore-.*'
          sudo apt-get remove -y '^dotnet-.*' --fix-missing
          sudo apt-get remove -y 'php.*' --fix-missing
          sudo apt-get remove -y '^mongodb-.*' --fix-missing
          sudo apt-get remove -y '^mysql-.*' --fix-missing
          sudo apt-get remove -y azure-cli google-chrome-stable firefox powershell --fix-missing
          sudo apt-get remove -y google-cloud-sdk --fix-missing
          sudo apt-get remove -y google-cloud-cli
          sudo apt-get autoremove -y

          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/go


          # Create extra swap
          sudo dd if=/dev/zero of=/swapfile_ bs=1024 count=10485760
          sudo mkswap /swapfile_
          sudo chmod 600 /swapfile_
          sudo swapon /swapfile_

          # Patch openssl.cnf for osxcross-macports to enable ripemd160
          sudo bash -c 'sed -i "s/^#openssl_conf = openssl_init/openssl_conf = openssl_init/g" /etc/ssl/openssl.cnf'
          sudo bash -c 'sed -i "s/^\[provider_sect\]/\[provider_sect\]\nlegacy = legacy_sect/g" /etc/ssl/openssl.cnf'
          sudo bash -c 'sed -i "s/^# activate = 1/activate = 1/g" /etc/ssl/openssl.cnf'
          sudo bash -c 'printf "\n[legacy_sect]\nactivate = 1\n" >> /etc/ssl/openssl.cnf'

          # Install deps
          rustup target add ${{ matrix.toolchain-name }}

          sudo apt install alsa pkg-config libssl-dev debhelper libappindicator3-1 libappindicator3-dev libglib2.0-dev libboost-all-dev cmake

          sudo apt-get clean

          unset CC CXX

          # Install npm dependencies and build TypeScript
          npm install
          npm run build

          # Run the configurator with ESM support
          NODE_OPTIONS="--loader ts-node/esm --no-warnings=ExperimentalWarning" npx ts-node --esm src_typescript/configurator.ts -b --config-file=application/config.json -p flatpak

          # Debug output
          echo "=== Build directory contents ==="
          ls -la build/ || echo "build directory missing"
          find . -name "*.flatpak" -type f || echo "No flatpak files found"

          # Remove swapfile
          sudo swapoff /swapfile_ || true
          sudo rm -f /swapfile_ || true

      - name: Upload sccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.cache/sccache
          key: sccache-${{ matrix.name }}

      - name: Upload artifact 1
        if: ${{ matrix['artifact-paths'][0] != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix['artifact-names'][0] }}
          path: ${{ matrix['artifact-paths'][0] }}

      - name: Upload artifact 2
        if: ${{ matrix['artifact-paths'][1] != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix['artifact-names'][1] }}
          path: ${{ matrix['artifact-paths'][1] }}

      - name: Upload artifact 3
        if: ${{ matrix['artifact-paths'][2] != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix['artifact-names'][2] }}
          path: ${{ matrix['artifact-paths'][2] }}
